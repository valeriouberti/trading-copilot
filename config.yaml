# ── Trading Copilot — config.yaml (OPTIONAL) ─────────────────
#
# This file is OPTIONAL. The app works without it using defaults.
# Values here are used ONLY for initial seeding on first startup.
# After that, all data lives in the database.
#
# To configure the app, use:
#   - .env file (or environment variables) for secrets and settings
#   - Web dashboard for assets, RSS feeds, and Telegram
# ──────────────────────────────────────────────────────────────

# ── Seed RSS Feeds (first-run only) ──────────────────────────
# Imported into the database on first startup when the rss_feeds
# table is empty. After that, defaults are used if this file is
# absent. Changes here have NO effect once the DB has been seeded.
rss_feeds:
  - url: https://feeds.finance.yahoo.com/rss/2.0/headline?s=^IXIC&region=US&lang=en-US
    name: Yahoo Finance NASDAQ
  - url: https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=100003114
    name: CNBC Top News
  - url: https://www.investing.com/rss/news_14.rss
    name: Investing.com
  - url: https://feeds.marketwatch.com/marketwatch/topstories/
    name: MarketWatch Top Stories

# ── Seed Assets (first-run only) ─────────────────────────────
# Same as above — imported into DB on first startup only.
# Manage assets via the web dashboard after initial setup.
seed_assets:
  - symbol: NQ=F
    display_name: NASDAQ 100 Futures
  - symbol: ES=F
    display_name: S&P 500 Futures
  - symbol: EURUSD=X
    display_name: EUR/USD
  - symbol: GC=F
    display_name: Gold Futures
  - symbol: AAPL
    display_name: Apple Inc.
  - symbol: NVDA
    display_name: NVIDIA Corporation
