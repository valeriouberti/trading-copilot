# ── ETF Swing Trader — config.yaml (OPTIONAL) ────────────────
#
# This file is OPTIONAL. The app works without it using defaults.
# Values here are used ONLY for initial seeding on first startup.
# After that, all data lives in the database.
#
# To configure the app, use:
#   - .env file (or environment variables) for secrets and settings
#   - Web dashboard for assets, RSS feeds, and Telegram
# ──────────────────────────────────────────────────────────────

# ── Seed RSS Feeds (first-run only) ──────────────────────────
# Generic macro/financial news feeds. Per-ETF category feeds
# (Yahoo SPY/QQQ/GLD/EEM proxies, CNBC Europe, etc.) are added
# automatically by the news_fetcher module.
rss_feeds:
  # -- Benzinga (ETF-focused + markets) --
  - url: https://www.benzinga.com/etfs/feed
    name: Benzinga ETFs
  - url: https://www.benzinga.com/markets/feed
    name: Benzinga Markets

  # -- CNBC --
  - url: https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=100003114
    name: CNBC Top News
  - url: https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=20910258
    name: CNBC Economy
  - url: https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=100727362
    name: CNBC World Markets

  # -- Yahoo Finance --
  - url: https://feeds.finance.yahoo.com/rss/2.0/headline?s=^GSPC&region=US&lang=en-US
    name: Yahoo Finance S&P 500

  # -- MarketWatch --
  - url: https://feeds.marketwatch.com/marketwatch/topstories/
    name: MarketWatch Top Stories
  - url: https://feeds.marketwatch.com/marketwatch/marketpulse/
    name: MarketWatch Market Pulse

  # -- Google News (economy/business) --
  - url: https://news.google.com/rss/topics/CAAqJggKIiBDQkFTRWdvSUwyMHZNRGx6TVdZU0FtVnVHZ0pWVXlnQVAB?hl=en-US&gl=US&ceid=US:en
    name: Google News Economy

  # -- ECB (for euro bond/rate context) --
  - url: https://www.ecb.europa.eu/rss/press.html
    name: ECB Press Releases

# ── Seed Assets (first-run only) ─────────────────────────────
# UCITS ETFs on Borsa Italiana — 5 assets validated by backtest.
# Bond/EM ETFs removed: insufficient volatility for swing trading.
# Manage assets via the web dashboard after initial setup.
seed_assets:
  - symbol: SWDA.MI
    display_name: iShares Core MSCI World
  - symbol: CSSPX.MI
    display_name: iShares Core S&P 500
  - symbol: EQQQ.MI
    display_name: Invesco NASDAQ-100
  - symbol: MEUD.MI
    display_name: Amundi STOXX Europe 600
  - symbol: SGLD.MI
    display_name: Invesco Physical Gold
