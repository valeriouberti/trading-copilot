{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <a href="/trades" class="back-link">&larr; Trade Journal</a>
    <h1>Signal History</h1>
    <p class="subtitle">All signals generated by the system</p>
</div>

<!-- Filters -->
<div class="filters-bar">
    <select class="form-input filter-select" id="sig-outcome" onchange="loadSignals()">
        <option value="">All Outcomes</option>
        <option value="PENDING">Pending</option>
        <option value="TP_HIT">TP Hit</option>
        <option value="SL_HIT">SL Hit</option>
        <option value="MANUAL">Manual</option>
    </select>
    <span class="filter-count" id="signal-count"></span>
</div>

<div class="card" style="overflow-x:auto;">
    <table class="trades-table">
        <thead>
            <tr>
                <th>Date</th>
                <th>Asset</th>
                <th>Dir</th>
                <th>Entry</th>
                <th>SL</th>
                <th>TP</th>
                <th>QS</th>
                <th>MTF</th>
                <th>Regime</th>
                <th>Sent.</th>
                <th>Outcome</th>
                <th>P&L</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="signals-body">
            <tr><td colspan="13" class="empty-state">Loading signals...</td></tr>
        </tbody>
    </table>
</div>

<!-- Update Outcome Modal -->
<div id="outcome-modal" class="modal-overlay" style="display:none;" onclick="if(event.target===this) this.style.display='none'">
    <div class="modal-box" x-data="outcomeForm()">
        <h2>Update Signal Outcome</h2>
        <div class="form-group">
            <label class="form-label">Outcome</label>
            <select class="form-input" x-model="outcome">
                <option value="TP_HIT">TP Hit</option>
                <option value="SL_HIT">SL Hit</option>
                <option value="MANUAL">Manual Close</option>
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">Exit Price <span class="form-hint">(optional)</span></label>
            <input type="number" step="any" class="form-input" x-model.number="outcomePrice">
        </div>
        <div class="form-actions" style="margin-top:16px;">
            <button class="btn btn-success" @click="submit()">Save</button>
            <button class="btn btn-secondary" onclick="document.getElementById('outcome-modal').style.display='none'">Cancel</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let outcomeSignalId = null;

async function loadSignals() {
    const outcome = document.getElementById('sig-outcome').value;
    let url = '/api/signals?limit=200';
    if (outcome) url += '&outcome=' + outcome;

    try {
        const res = await fetch(url);
        const data = await res.json();
        document.getElementById('signal-count').textContent = data.total + ' signals';
        renderSignals(data.signals || []);
    } catch (e) { console.error(e); }
}

function renderSignals(signals) {
    const tbody = document.getElementById('signals-body');
    if (!signals.length) {
        tbody.innerHTML = '<tr><td colspan="13" class="empty-state">No signals recorded yet. Start monitoring an asset to generate signals.</td></tr>';
        return;
    }
    tbody.innerHTML = signals.map(s => {
        const date = s.timestamp ? new Date(s.timestamp).toLocaleString() : '-';
        const dirBadge = s.direction === 'LONG' ? 'badge-bullish' : 'badge-bearish';
        const outBadge = s.outcome === 'TP_HIT' ? 'badge-bullish' :
                         s.outcome === 'SL_HIT' ? 'badge-bearish' : 'badge-neutral';
        const pnlClass = (s.outcome_pips || 0) > 0 ? 'price-up' : (s.outcome_pips || 0) < 0 ? 'price-down' : '';
        const isPending = s.outcome === 'PENDING';
        return `<tr>
            <td style="font-size:12px;">${date}</td>
            <td><strong>${s.symbol}</strong></td>
            <td><span class="badge ${dirBadge}">${s.direction}</span></td>
            <td class="mono">${fmt(s.entry_price)}</td>
            <td class="mono">${fmt(s.stop_loss)}</td>
            <td class="mono">${fmt(s.take_profit)}</td>
            <td>${s.quality_score || 0}</td>
            <td>${s.mtf_alignment || '-'}</td>
            <td>${s.regime || '-'}</td>
            <td class="mono">${s.sentiment_score !== null ? s.sentiment_score.toFixed(1) : '-'}</td>
            <td><span class="badge ${outBadge}">${s.outcome}</span></td>
            <td class="mono ${pnlClass}">${s.outcome_pips !== null ? s.outcome_pips.toFixed(2) : '-'}</td>
            <td>${isPending ? '<button class="btn btn-secondary" style="padding:4px 10px; font-size:11px;" onclick="openOutcomeModal(' + s.id + ')">Update</button>' : ''}</td>
        </tr>`;
    }).join('');
}

function fmt(n) {
    if (n === null || n === undefined) return '-';
    return typeof n === 'number' ? n.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}) : n;
}

function openOutcomeModal(id) {
    outcomeSignalId = id;
    document.getElementById('outcome-modal').style.display = 'flex';
}

function outcomeForm() {
    return {
        outcome: 'TP_HIT',
        outcomePrice: null,
        async submit() {
            const body = { outcome: this.outcome };
            if (this.outcomePrice) body.outcome_price = this.outcomePrice;
            const res = await fetch('/api/signals/' + outcomeSignalId + '/outcome', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
            });
            if (res.ok) {
                document.getElementById('outcome-modal').style.display = 'none';
                loadSignals();
            }
        }
    };
}

document.addEventListener('DOMContentLoaded', loadSignals);
</script>
{% endblock %}
