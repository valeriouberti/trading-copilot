<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title | default("Trading Copilot") }}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script defer src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <span class="nav-logo">&#9670;</span>
            <a href="/">Trading Copilot</a>
        </div>
        <div class="nav-links">
            <a href="/" class="nav-link {% if request.url.path == '/' %}nav-active{% endif %}">Dashboard</a>
            <span class="nav-sep"></span>
            {% for a in nav_assets %}
            <a href="/asset/{{ a.symbol }}" class="nav-link nav-asset {% if request.url.path == '/asset/' + a.symbol %}nav-active{% endif %}">{{ a.display_name }}</a>
            {% endfor %}
            <span class="nav-sep"></span>
            <a href="/signals" class="nav-link {% if request.url.path == '/signals' %}nav-active{% endif %}">Signals</a>
            <a href="/trades" class="nav-link {% if request.url.path == '/trades' %}nav-active{% endif %}">Trades</a>
            <a href="/analytics" class="nav-link {% if request.url.path == '/analytics' %}nav-active{% endif %}">Analytics</a>
            <a href="/settings" class="nav-link nav-icon {% if request.url.path == '/settings' %}nav-active{% endif %}" title="Settings">&#9881;</a>
        </div>
        <div class="nav-status">
            <span class="status-dot" id="status-dot"></span>
            <span class="status-text" id="status-text">Connecting...</span>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <span>Trading Copilot v5.3.0</span>
        <span class="footer-sep">|</span>
        <span>Not financial advice. Trade at your own risk.</span>
    </footer>

    <script src="/static/js/websocket.js"></script>
    <script>
    // Keep status text in sync with WebSocket state
    document.addEventListener("ws:connected", function() {
        var dot = document.getElementById("status-dot");
        var txt = document.getElementById("status-text");
        if (dot) dot.style.background = "var(--accent-green)";
        if (txt) { txt.textContent = "Live"; txt.style.color = "var(--accent-green)"; }
    });
    document.addEventListener("ws:disconnected", function() {
        var dot = document.getElementById("status-dot");
        var txt = document.getElementById("status-text");
        if (dot) dot.style.background = "var(--accent-red)";
        if (txt) { txt.textContent = "Offline"; txt.style.color = "var(--accent-red)"; }
    });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
